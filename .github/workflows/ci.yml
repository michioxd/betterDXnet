name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "assets/**"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "bun.lock"
      - "manifest.config.ts"
      - "package.json"
      - "tsconfig*.json"
      - "vite.config.ts"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "assets/**"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "bun.lock"
      - "manifest.config.ts"
      - "package.json"
      - "tsconfig*.json"
      - "vite.config.ts"

jobs:
  format:
    name: Check format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check format
        run: bun run format:check

  build-chrome:
    name: Build Chrome
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Chrome extension
        run: bun run build

  build-firefox:
    name: Build Firefox
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Firefox extension
        run: bun run build:firefox
